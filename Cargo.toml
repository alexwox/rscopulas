[workspace]
members = [
    "crates/rscopulas-core",
    "crates/rscopulas-accel",
    "crates/rscopulas-python",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
authors = ["alwo"]
repository = ""

[workspace.dependencies]
faer = { version = "0.19", features = ["rayon"] }
ndarray = { version = "0.17", features = ["serde"] }
rand = "0.9.2"
serde = { version = "1.0.228", features = ["derive"] }
thiserror = "2.0"

